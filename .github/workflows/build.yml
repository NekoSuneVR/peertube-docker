name: Build PeerTube Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: "PeerTube version tag"
        default: "v6.3.3"
        required: true

      push:
        description: "Push to GHCR"
        type: boolean
        default: false


jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write


    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Lowercase Image Name
      run: |
        echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV


    - name: QEMU
      uses: docker/setup-qemu-action@v3


    - name: Buildx
      uses: docker/setup-buildx-action@v3


    - name: Login GHCR
      if: ${{ inputs.push }}
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}


    - name: Build PeerTube
      uses: docker/build-push-action@v6
      with:
        context: ./peertube
        platforms: linux/amd64,linux/arm64
        push: ${{ inputs.push }}
        build-args: |
          PEERTUBE_VERSION=${{ inputs.version }}
        tags: |
          ${{ env.IMAGE }}/peertube:${{ inputs.version }}
          ${{ env.IMAGE }}/peertube:latest


    - name: Build Transcoder
      uses: docker/build-push-action@v6
      with:
        context: ./transcoder
        platforms: linux/amd64,linux/arm64
        push: ${{ inputs.push }}
        build-args: |
          PEERTUBE_VERSION=${{ inputs.version }}
        tags: |
          ${{ env.IMAGE }}/peertube-transcoder:${{ inputs.version }}
          ${{ env.IMAGE }}/peertube-transcoder:latest
